# Alembic configuration.
#
# The database URL is intentionally NOT hard-coded here. Instead, alembic/env.py
# reads it from the application settings (which come from environment variables),
# so migrations use the same DATABASE_URL as the app.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate new migration filenames (timestamp + slug).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Use OS-native path separators.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
