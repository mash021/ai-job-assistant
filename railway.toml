# Railway deployment config for the FastAPI backend.
# Create a new Railway project, add PostgreSQL, then deploy from this repo.
# Docs: DEPLOYMENT.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.prod"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
